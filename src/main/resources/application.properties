spring.application.name=restfull-api

# Port dinamis untuk Render
server.port=${PORT:8080}

# Konfigurasi database menggunakan env variables dengan default fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.jmgbhgtbvhgpqwcsklhj}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:restfullapi123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
